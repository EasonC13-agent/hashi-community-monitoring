groups:
  - name: hashi-actionable-only
    rules:
      - alert: HashiNodeDown
        expr: up{job="hashi"} == 0
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: "Hashi metrics unavailable for {{ $labels.node }}"
      - alert: HashiBitcoinSyncStalled
        expr: hashi_kyoto_synced == 0 or hashi_kyoto_connected_peers < 1
        for: 30m
        labels: {severity: critical}
        annotations:
          summary: "Hashi Kyoto remains unhealthy on {{ $labels.node }}"
      - alert: BitcoinRPCDown
        expr: bitcoin_node_rpc_available == 0
        for: 15m
        labels: {severity: critical}
        annotations:
          summary: "Bitcoin RPC remains unavailable on {{ $labels.node }}"
      - alert: HashiOperatorSuiLow
        expr: hashi_operator_sui_balance_mist / 1e9 < 15
        for: 30m
        labels: {severity: critical}
        annotations:
          summary: "Hashi operator SUI reserve below 15 SUI on {{ $labels.node }}"
