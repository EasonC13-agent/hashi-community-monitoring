services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: hashi-community-prometheus
    network_mode: host
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=3d
      - --storage.tsdb.retention.size=20GB
      - --web.listen-address=127.0.0.1:19090
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.1.0
    container_name: hashi-community-grafana
    network_mode: host
    restart: unless-stopped
    environment:
      GF_SERVER_HTTP_ADDR: 127.0.0.1
      GF_SERVER_HTTP_PORT: 33000
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:33000/}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hashi-community.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  sui-balance-exporter:
    build: ./exporters/sui-balance
    container_name: hashi-community-sui-balance
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: 19100
      REFRESH_SECONDS: 60
      SUI_GRAPHQL_URL: ${SUI_GRAPHQL_URL:-https://graphql.testnet.sui.io/graphql}
      NODES_JSON: ${NODES_JSON:?set NODES_JSON}

  fleet-prober:
    build: ./exporters/fleet-prober
    container_name: hashi-community-fleet-prober
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: 19101
      NETWORK: testnet
      ROSTER_FILE: /data/committee.json
      REFRESH_SECONDS: 60
      PROBE_TIMEOUT_SECONDS: 5
      PROBE_WORKERS: 24
      SERVICE_INFO_REFRESH_SECONDS: 300
    volumes:
      - ./data/committee.json:/data/committee.json:ro

  bitcoin-exporter:
    build: ./exporters/bitcoin
    container_name: hashi-community-bitcoin-exporter
    network_mode: host
    restart: unless-stopped
    environment:
      BITCOIN_RPC_USERNAME: ""
      BITCOIN_RPC_PASSWORD: ""
      BITCOIN_RPC_COOKIE_FILE: /bitcoin-cookie/.cookie
      BITCOIN_RPC_IP: 127.0.0.1
      BITCOIN_RPC_PORT: ${BITCOIN_RPC_PORT:-38332}
      BITCOIN_RPC_TIMEOUT: 10
      PROMETHEUS_HOST: 127.0.0.1
      PROMETHEUS_PORT: 19097
      PROMETHEUS_COLLECT_INTERVAL: 15
      APP_LOG_LEVEL: INFO
    volumes:
      - ${BITCOIN_COOKIE_PATH:-/mnt/PCIE5_4T_SSD/hashi-testnet/bitcoin/data/signet/.cookie}:/bitcoin-cookie/.cookie:ro

volumes:
  prometheus-data:
  grafana-data:
